<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CALC — Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<main class="wrapper">
    <div class="card">

        <div class="card-header">
            <div class="header-left">
                <div class="tag">v1.0.0 — Spring Boot</div>
                <h1>CAL<span>C</span></h1>
            </div>
            <div class="header-icon">🖩</div>
        </div>

        <div class="calc-form">

            <div>
                <div class="section-label">Numbers</div>
                <div class="inputs-row">
                    <div class="input-group">
                        <input type="number" id="numberA" step="any" placeholder="42" class="num-input" autocomplete="off"/>
                    </div>
                    <div class="operator-display" id="opDisplay">?</div>
                    <div class="input-group">
                        <input type="number" id="numberB" step="any" placeholder="8" class="num-input" autocomplete="off"/>
                    </div>
                </div>
            </div>

            <div>
                <div class="section-label">Operation</div>
                <div class="ops-grid">
                    <label class="op-card" data-op="add" data-sym="+">
                        <input type="radio" name="operation" value="add"/>
                        <span class="op-sym">+</span>
                        <span class="op-name">Add</span>
                    </label>
                    <label class="op-card" data-op="subtract" data-sym="−">
                        <input type="radio" name="operation" value="subtract"/>
                        <span class="op-sym">−</span>
                        <span class="op-name">Sub</span>
                    </label>
                    <label class="op-card" data-op="multiply" data-sym="×">
                        <input type="radio" name="operation" value="multiply"/>
                        <span class="op-sym">×</span>
                        <span class="op-name">Mul</span>
                    </label>
                    <label class="op-card" data-op="divide" data-sym="÷">
                        <input type="radio" name="operation" value="divide"/>
                        <span class="op-sym">÷</span>
                        <span class="op-name">Div</span>
                    </label>
                </div>
            </div>

            <button class="calc-btn" id="calcBtn">
                <span id="btnText">Calculate</span>
            </button>
        </div>

        <div class="result-area" id="resultArea"></div>

        <div class="card-footer">
            <a href="www.bitnoises.com" class="footer-text">www.bitnoises.com &copy; <span id="year"></span></a>
        </div>
    </div>
</main>

<script th:src="@{/js/app.js}"></script>

</body>
</html>
