name: Pipeline deployment
on:
  push:
    branches:
      - main
env:
  IMAGE: ahagbes/calculator
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Build jar
        run: mvn clean package -DskipTests

      - name: Login to dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Package image
        run: docker buildx build -t $IMAGE . --load

      - name: Save docker image to tar
        run: docker save $IMAGE -o calculator.tar

      - name: Copy files via SSH
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: "calculator.tar,compose.yml"
          target: "/home/${{secrets.USERNAME}/"

      - name: Launch compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            docker load -i calculator.tar
            rm calculator.tar
  
            sudo mkdir -p /srv/calculator
            sudo mv /home/${{ secrets.USERNAME }}/compose.yml /srv/calculator/
  
            cd /srv/calculator
            sudo docker compose down
            sudo docker compose up -d
          
